<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Glow Up Planner ✨</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="Glow Up">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffe6ea;
            --card-bg: #ffffff;
            --primary-pink: #ff6b81;
            --secondary-pink: #ff9eaa;
            --text-dark: #4a4a4a;
            --text-light: #8a8a8a;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background-color: var(--card-bg); width: 100%; max-width: 450px; border-radius: 25px; box-shadow: 0 10px 30px rgba(255, 107, 129, 0.15); padding: 30px; box-sizing: border-box; }
        h1 { text-align: center; color: var(--primary-pink); font-weight: 900; margin-top: 0; font-size: 28px; }
        .date-display { text-align: center; font-size: 18px; color: var(--text-light); margin-bottom: 25px; font-weight: 700; }
        .day-selector { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn { flex: 1; margin: 0 5px; padding: 12px 10px; background-color: var(--secondary-pink); color: white; border: none; border-radius: 15px; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:hover { transform: translateY(-2px); background-color: var(--primary-pink); }
        .btn.active { background-color: var(--primary-pink); box-shadow: inset 0 3px 5px rgba(0,0,0,0.2); }
        .time-inputs { display: none; text-align: center; margin-bottom: 20px; background-color: #fff0f2; padding: 15px; border-radius: 15px; }
        .time-inputs input { padding: 8px; border: 2px solid var(--secondary-pink); border-radius: 10px; margin: 0 5px; font-family: 'Nunito', sans-serif; color: var(--primary-pink); }
        .section-title { font-size: 20px; color: var(--primary-pink); border-bottom: 2px dashed var(--secondary-pink); padding-bottom: 5px; margin-top: 25px; margin-bottom: 15px; }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item { display: flex; align-items: center; background-color: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; transition: background-color 0.3s; }
        .task-item.completed { background-color: #e8f5e9; opacity: 0.7; }
        .task-item input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--primary-pink); cursor: pointer; }
        .task-text { flex-grow: 1; font-size: 16px; font-weight: 700; }
        .food-box { background-color: #fff0f2; padding: 15px; border-radius: 15px; text-align: center; font-weight: 700; margin-bottom: 10px; }
        .food-box span { color: var(--primary-pink); font-size: 18px; display: block; margin-top: 5px; }
        .big-btn { width: 100%; padding: 15px; background-color: var(--primary-pink); color: white; font-size: 18px; border: none; border-radius: 15px; font-weight: 900; margin-top: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4); transition: transform 0.2s; }
        .big-btn:hover { transform: scale(1.02); }
        #loading { text-align: center; color: var(--primary-pink); font-weight: 700; display: none; margin-top: 15px; }
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="checkSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>

    <div class="app-container">
        <h1 id="appTitle">Loading...</h1>
        <div class="date-display" id="dateDisplay">Loading Date...</div>

        <div class="day-selector">
            <button class="btn active" id="btnWork" onclick="setDayType('Work')">Work Day</button>
            <button class="btn" id="btnOff" onclick="setDayType('Off')">Day Off</button>
            <button class="btn" id="btnTravel" onclick="setDayType('Travel')">Travel</button>
        </div>

        <div class="time-inputs" id="timeInputs">
            <label>Work Hours:</label><br>
            <input type="time" id="startTime" value="09:00"> to 
            <input type="time" id="endTime" value="19:00">
        </div>

        <div class="section-title" id="titleMenu">Today's Menu</div>
        <div class="food-box">
            Lunch: <span id="lunchRandom">Loading...</span>
        </div>
        <div class="food-box">
            Dinner: <span id="dinnerRandom">Loading...</span>
        </div>

        <div class="section-title" id="titleDaily">Daily Quests</div>
        <ul class="task-list" id="dailyTasks"></ul>

        <div class="section-title" id="titleWeekly">Weekly & Beauty Quests</div>
        <ul class="task-list" id="weeklyTasks"></ul>

        <button class="big-btn" id="btnComplete" onclick="saveProgress()">Complete My Day! 💖</button>
        <div id="loading">Saving to your Google Sheet...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzHoRsT8_lE2KIAj6712zOmLC4RIlJyRHkKoaunL2iC_2bIoRHobcrXY-sMb4Rt8boQQg/exec";
        
        let currentDayType = 'Work';
        let dbData = null; 
        let todayLunch = "";
        let todayDinner = "";

        const checkSfx = document.getElementById('checkSound');
        const winSfx = document.getElementById('winSound');

        function setupDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            document.getElementById('dateDisplay').innerText = today.toLocaleDateString('en-US', options);
        }

        async function fetchDatabase() {
            try {
                const response = await fetch(API_URL);
                dbData = await response.json();
                
                // Update the Interface text from the database!
                if(dbData.ui) {
                    document.getElementById('appTitle').innerText = dbData.ui['app_title'] || "Glow Up Planner";
                    document.getElementById('btnWork').innerText = dbData.ui['btn_work'] || "Work Day";
                    document.getElementById('btnOff').innerText = dbData.ui['btn_off'] || "Day Off";
                    document.getElementById('btnTravel').innerText = dbData.ui['btn_travel'] || "Travel";
                    document.getElementById('titleMenu').innerText = dbData.ui['title_menu'] || "Today's Menu";
                    document.getElementById('titleDaily').innerText = dbData.ui['title_daily'] || "Daily Quests";
                    document.getElementById('titleWeekly').innerText = dbData.ui['title_weekly'] || "Weekly Quests";
                    document.getElementById('btnComplete').innerText = dbData.ui['btn_complete'] || "Complete!";
                }

                generateMeals();
                generateTasks();
            } catch (error) {
                console.error("Error fetching data", error);
            }
        }

        function setDayType(type) {
            currentDayType = type;
            document.getElementById('btnWork').classList.remove('active');
            document.getElementById('btnOff').classList.remove('active');
            document.getElementById('btnTravel').classList.remove('active');
            document.getElementById('btn' + type).classList.add('active');
            
            document.getElementById('timeInputs').style.display = (type === 'Work') ? 'block' : 'none';
            generateMeals();
            generateTasks();
        }

        function generateMeals() {
            if (!dbData) return;
            const weekSpots = dbData.restaurants.Weekday;
            const weekendSpots = dbData.restaurants.Weekend;
            
            if (currentDayType === 'Work') {
                todayLunch = weekSpots[Math.floor(Math.random() * weekSpots.length)];
                todayDinner = weekSpots[Math.floor(Math.random() * weekSpots.length)];
            } else if (currentDayType === 'Off') {
                todayLunch = weekendSpots[Math.floor(Math.random() * weekendSpots.length)];
                todayDinner = weekendSpots[Math.floor(Math.random() * weekendSpots.length)];
            } else {
                todayLunch = "Explore Local Vegan Food!";
                todayDinner = "Explore Local Vegan Food!";
            }
            
            document.getElementById('lunchRandom').innerText = todayLunch;
            document.getElementById('dinnerRandom').innerText = todayDinner;
        }

        function generateTasks() {
            if (!dbData || !dbData.ui) return;
            const dailyList = document.getElementById('dailyTasks');
            const weeklyList = document.getElementById('weeklyTasks');
            const today = new Date();
            const dateNumber = today.getDate();
            
            dailyList.innerHTML = "";
            weeklyList.innerHTML = "";

            if (currentDayType !== 'Travel') {
                dailyList.innerHTML += createTaskHTML("gym", dbData.ui['task_gym']);
                dailyList.innerHTML += createTaskHTML("edit", dbData.ui['task_edit']);
                dailyList.innerHTML += createTaskHTML("video", dbData.ui['task_video']);
            } else {
                dailyList.innerHTML += createTaskHTML("travel_cardio", dbData.ui['task_travel_cardio']);
                dailyList.innerHTML += createTaskHTML("travel_film", dbData.ui['task_travel_film']);
            }

            if (currentDayType !== 'Travel') {
                document.getElementById('titleWeekly').style.display = 'block';
                weeklyList.innerHTML += createTaskHTML("laundry", dbData.ui['task_laundry']);
                weeklyList.innerHTML += createTaskHTML("clean", dbData.ui['task_clean']);
                
                if (dateNumber === 17) weeklyList.innerHTML += createTaskHTML("beauty_hair", dbData.ui['task_beauty_hair']);
                if (dateNumber === 21) weeklyList.innerHTML += createTaskHTML("beauty_laser", dbData.ui['task_beauty_laser']);
                
                weeklyList.innerHTML += createTaskHTML("savings", dbData.ui['task_savings']);
            } else {
                document.getElementById('titleWeekly').style.display = 'none';
            }
        }

        function createTaskHTML(id, text) {
            return `
                <li class="task-item" id="item_${id}">
                    <input type="checkbox" id="${id}" onchange="playSoundAndStyle(this, 'item_${id}')">
                    <span class="task-text">${text || 'Task'}</span>
                </li>
            `;
        }

        function playSoundAndStyle(checkbox, itemId) {
            if(checkbox.checked) {
                checkSfx.currentTime = 0;
                checkSfx.play();
                document.getElementById(itemId).classList.add('completed');
            } else {
                document.getElementById(itemId).classList.remove('completed');
            }
        }

        async function saveProgress() {
            winSfx.play();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff6b81', '#ff9eaa', '#ffffff'] });
            document.getElementById('loading').style.display = 'block';

            const payload = {
                Date: document.getElementById('dateDisplay').innerText,
                Day_Type: currentDayType,
                Start_Time: currentDayType === 'Work' ? document.getElementById('startTime').value : "N/A",
                End_Time: currentDayType === 'Work' ? document.getElementById('endTime').value : "N/A",
                Lunch: todayLunch,
                Dinner: todayDinner,
                Gym_10min: document.getElementById('gym') ? document.getElementById('gym').checked : false,
                Edit_2min: document.getElementById('edit') ? document.getElementById('edit').checked : false,
                Video_Watched: document.getElementById('video') ? document.getElementById('video').checked : false,
                Laundry_Done: document.getElementById('laundry') ? document.getElementById('laundry').checked : false,
                DeepClean_Done: document.getElementById('clean') ? document.getElementById('clean').checked : false,
                Beauty_Done: false, 
                Savings_KRW: document.getElementById('savings') && document.getElementById('savings').checked ? 375000 : 0
            };

            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('loading').innerText = "✨ Saved Successfully! See you tomorrow! ✨";
                setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 3000);
            } catch(e) {
                document.getElementById('loading').innerText = "Error saving.";
            }
        }

        setupDate();
        setDayType('Work'); 
        fetchDatabase(); 

    </script>
</body>
</html>
