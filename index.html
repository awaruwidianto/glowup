<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Glow Up Planner ✨</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-title" content="Glow Up">

    <!-- Fonts from AWARU Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --ink: #27213f; --ink-soft: #5f5684; --cream: #fff9f1;
            --glass: rgba(255, 255, 255, 0.68);
            --purple: #a78bfa; --pink: #ff94cf; --mint: #b5f7d3; --yellow: #ffe58f;
            --shadow: 0 24px 70px rgba(46, 24, 98, 0.28);
            --font-title: "Nunito", sans-serif; --font-body: "Nunito", sans-serif;
        }

        * { box-sizing: border-box; } html { min-height: 100%; }
        
        body {
            margin: 0; min-height: 100vh; overflow-x: hidden;
            color: var(--ink); font-family: var(--font-body);
            background: radial-gradient(circle at 18% 16%, rgba(255, 201, 238, .72), transparent 28%),
                        radial-gradient(circle at 82% 26%, rgba(142, 231, 255, .58), transparent 24%),
                        radial-gradient(circle at 45% 88%, rgba(181, 247, 211, .45), transparent 30%),
                        linear-gradient(130deg, #c9b6ff, #ffbbdb, #7f83ff, #7fe7ff, #cfb7ff);
            background-size: 200% 200%; animation: galaxyShift 22s ease-in-out infinite;
        }

        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,.92) 0 1px, transparent 1.5px),
                              radial-gradient(circle, rgba(255,255,255,.72) 0 1px, transparent 1.6px);
            background-size: 44px 44px, 72px 72px; animation: starDrift 34s linear infinite;
        }

        .galaxy-loader { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; padding: 20px; background: radial-gradient(circle at 20% 20%, rgba(255,148,207,.55), transparent 28%), linear-gradient(135deg, #33285b, #6d5dfc, #ff94cf); transition: opacity .45s ease, visibility .45s ease; }
        .galaxy-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .ufo-loader { position: relative; width: 132px; height: 132px; animation: ufoLoaderFloat 2.2s ease-in-out infinite; }
        .ufo-loader-dome { position: absolute; left: 38px; top: 18px; width: 56px; height: 42px; border-radius: 56px 56px 18px 18px; background: linear-gradient(145deg, rgba(255,255,255,.96), rgba(142,231,255,.68)); border: 3px solid rgba(255,255,255,.88); z-index: 2; }
        .ufo-loader-body { position: absolute; left: 14px; top: 50px; width: 104px; height: 42px; border-radius: 50%; background: linear-gradient(180deg, #fff9f1, #ff94cf 52%, #8b7dff); border: 3px solid rgba(255,255,255,.88); z-index: 3; display:flex; justify-content:center; align-items:flex-end; gap:12px; padding-bottom:7px; }
        .ufo-loader-body span { width: 9px; height: 9px; border-radius: 50%; background: #ffe58f; animation: ufoLight 1s ease-in-out infinite alternate; }
        .ufo-loader-beam { position:absolute; left:34px; top:80px; width:64px; height:50px; background: linear-gradient(180deg, rgba(181,247,211,.48), rgba(142,231,255,0)); clip-path: polygon(28% 0,72% 0,100% 100%,0 100%); animation: beamPulse 1.4s ease-in-out infinite; }

        .galaxy-stage { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: clamp(12px, 3vw, 36px); perspective: 1200px; }

        .app-shell { width: min(100%, 550px); border: 4px solid rgba(66, 43, 108, .92); border-radius: 34px; background: linear-gradient(145deg, rgba(255,255,255,.77), rgba(255,255,255,.46)); box-shadow: var(--shadow), inset 0 0 0 4px rgba(255,255,255,.58); backdrop-filter: blur(22px); transform-style: preserve-3d; transition: transform 0.1s ease-out; padding-bottom: 20px; }
        .topbar { display: flex; align-items: center; gap: 12px; padding: 20px; background: rgba(255,255,255,.38); border-bottom: 3px solid rgba(86,65,121,.20); border-radius: 30px 30px 0 0; }
        .brand-badge { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(145deg, #fff, #ffd8ec); border: 3px solid rgba(86,65,121,.68); box-shadow: 0 5px 0 rgba(86,65,121,.23); padding: 5px; }
        .brand-badge img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
        h1 { margin: 0; font-family: var(--font-title); font-size: 26px; font-weight: 900; color: #5140b8; text-transform: uppercase; }
        
        .screen-content { padding: 20px; }
        .date-display { text-align: center; font-size: 16px; color: var(--ink-soft); margin-bottom: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .day-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .game-button { flex: 1; display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 8px 14px; font-size: 14px; border-radius: 14px; border: 3px solid rgba(69,44,109,.82); background: linear-gradient(180deg, #fff7bf, #ffbfde); color: #4b3970; font-weight: 900; font-family: var(--font-title); cursor: pointer; box-shadow: 0 4px 0 rgba(70, 49, 117, .34); transition: transform .15s, box-shadow .15s; white-space: nowrap; }
        .game-button:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.05); }
        .game-button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 0 0 rgba(70,49,117,.34); }
        .game-button.active { background: linear-gradient(180deg, #aef2ff, #aa93ff); color: white; }

        .primary-button { background: linear-gradient(180deg, #ff94cf, #ff6b81); color: white; width: 100%; font-size: 18px; padding: 14px; margin-top: 20px; }
        .primary-button:disabled { background: #b5f7d3; color: #27213f; cursor: not-allowed; opacity: 0.8; box-shadow: none; transform: none; border-color: #5f5684; }
        
        .time-inputs { display: none; text-align: center; margin-bottom: 20px; background: rgba(255,255,255,.5); padding: 15px; border-radius: 18px; border: 2px dashed rgba(86,65,121,.25); font-weight: 800; color: var(--ink-soft); }
        .time-inputs input { padding: 8px; border: 3px solid rgba(86,65,121,.3); border-radius: 12px; margin: 0 5px; font-family: var(--font-title); font-weight: 700; color: #5140b8; background: white; }

        .window-label { display: inline-block; padding: 4px 12px; border-radius: 999px; border: 3px solid rgba(69,44,109,.8); background: #fff7bf; font-family: var(--font-title); color: #6a4ddb; font-size: 12px; font-weight: 900; box-shadow: 0 4px 0 rgba(86,65,121,.22); margin-bottom: 10px; text-transform: uppercase; }
        .food-box { background: rgba(255,255,255,.7); padding: 15px; border-radius: 16px; border: 3px solid rgba(86,65,121,.28); text-align: center; font-weight: 800; margin-bottom: 10px; color: var(--ink-soft); }
        .food-box span { color: #5844c9; font-size: 18px; display: block; margin-top: 5px; font-weight: 900; }

        .task-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .task-item { display: flex; align-items: center; background: rgba(255,249,241,.86); padding: 14px; border-radius: 18px; border: 3px solid rgba(70,49,117,.62); margin-bottom: 10px; transition: all 0.3s; box-shadow: inset 0 0 0 3px rgba(255,255,255,.6); }
        .task-item.completed { background: #b5f7d3; opacity: 0.8; }
        .task-item input[type="checkbox"] { margin-right: 15px; width: 22px; height: 22px; accent-color: #ff94cf; cursor: pointer; flex-shrink: 0; }
        .task-text { flex-grow: 1; font-size: 16px; font-weight: 800; color: #3d315f; line-height: 1.3; }

        .task-item.overdue { border-color: #ff6b81; background: #ffe6eb; }
        .task-item.overdue .task-text { color: #d63031; }
        .task-item.upcoming { opacity: 0.6; background: rgba(255,255,255,0.4); border-style: dashed; }

        #loading { text-align: center; color: #5844c9; font-weight: 900; display: none; margin-top: 15px; background: #ffe58f; padding: 10px; border-radius: 12px; border: 2px solid #5844c9; font-size: 14px; }

        /* === MOBILE SHRINK HOTFIX === */
        @media (max-width: 500px) {
            .galaxy-stage { padding: 10px; } .app-shell { border-width: 3px; border-radius: 26px; padding-bottom: 15px; } .topbar { padding: 15px; gap: 10px; border-radius: 24px 24px 0 0; } h1 { font-size: 20px; } .brand-badge { width: 36px; height: 36px; padding: 4px; border-width: 2px; } .screen-content { padding: 14px; } .date-display { font-size: 13px; margin-bottom: 14px; } .day-selector { gap: 6px; margin-bottom: 15px; } .game-button { min-height: 36px; padding: 6px 4px; font-size: 11px; border-width: 2px; border-radius: 12px; } .window-label { font-size: 10px; padding: 3px 10px; border-width: 2px; } .food-box { padding: 10px; font-size: 13px; border-radius: 14px; border-width: 2px; margin-bottom: 8px; } .food-box span { font-size: 15px; margin-top: 2px; } .task-item { padding: 10px 12px; margin-bottom: 8px; border-radius: 14px; border-width: 2px; } .task-item input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; } .task-text { font-size: 14px; } .task-list { margin-bottom: 15px; } .primary-button { font-size: 15px; padding: 12px; margin-top: 12px; min-height: 44px; } .time-inputs { padding: 12px; font-size: 14px; } .time-inputs input { padding: 6px; font-size: 13px; border-width: 2px; }
        }

        .cosmic-decoration { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .planet { position: absolute; border-radius: 50%; animation: planetFloat 9s ease-in-out infinite; }
        .planet.one { width: 86px; height: 86px; left: 7%; top: 10%; background: radial-gradient(circle at 35% 28%, #fff4be, #ff9ece 48%, #8d82ff); box-shadow: 0 16px 28px rgba(61, 38, 104, .26); }
        .planet.two { width: 60px; height: 60px; right: 9%; top: 18%; background: radial-gradient(circle at 30% 24%, #dffcff, #8ee7ff 52%, #7167f9); animation-delay: -2.5s; }
        
        @keyframes galaxyShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        @keyframes starDrift { from{transform:translate3d(0,0,0)} to{transform:translate3d(-118px,118px,0)} }
        @keyframes ufoLoaderFloat { 0%,100% { transform: translateY(4px) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        @keyframes ufoLight { from { opacity:.45; transform:scale(.8); } to { opacity:1; transform:scale(1.15); } }
        @keyframes beamPulse { 0%,100% { opacity:.35; transform:scaleY(.88); } 50% { opacity:.8; transform:scaleY(1.08); } }
        @keyframes planetFloat { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-14px) rotate(3deg)} }
    </style>
</head>
<body>

    <div class="galaxy-loader" id="galaxy-loader">
        <div class="ufo-loader">
            <div class="ufo-loader-dome"></div>
            <div class="ufo-loader-body">
                <span></span><span></span><span></span>
            </div>
            <div class="ufo-loader-beam"></div>
        </div>
    </div>

    <div class="cosmic-decoration">
        <div class="planet one"></div>
        <div class="planet two"></div>
    </div>

    <main class="galaxy-stage" id="galaxy-stage">
        <div class="app-shell" id="app-shell">
            
            <header class="topbar">
                <div class="brand-badge">
                    <img src="icon.png" alt="Icon" onerror="this.style.display='none'"> 
                </div>
                <h1 id="appTitle">Glow Up 2026</h1>
            </header>

            <div class="screen-content">
                <div class="date-display" id="dateDisplay">Loading Date...</div>

                <div class="day-selector">
                    <button class="game-button active" id="btnWork" onclick="setDayType('Work')">💼 Work Day</button>
                    <button class="game-button" id="btnOff" onclick="setDayType('Off')">🌿 Day Off</button>
                    <button class="game-button" id="btnTravel" onclick="setDayType('Travel')">✈️ Travel</button>
                </div>

                <div class="time-inputs" id="timeInputs">
                    <label>Work Hours:</label><br><br>
                    <input type="time" id="startTime" value="09:00"> to 
                    <input type="time" id="endTime" value="19:00">
                </div>

                <div class="window-label" id="titleMenu">🥗 Today's Menu</div>
                <div class="food-box">
                    Lunch: <span id="lunchRandom">Loading...</span>
                </div>
                <div class="food-box" style="margin-bottom: 25px;">
                    Dinner: <span id="dinnerRandom">Loading...</span>
                </div>

                <div class="window-label" id="titleDaily">🏆 Daily Quests</div>
                <ul class="task-list" id="dailyTasks"></ul>

                <div id="weeklyContainer">
                    <div class="window-label" id="titleWeekly">📅 Weekly & Monthly Quests</div>
                    <ul class="task-list" id="weeklyTasks"></ul>
                </div>

                <button class="game-button primary-button" id="btnComplete" onclick="saveProgress()">Complete My Day! 💖</button>
                <div id="loading">🚀 Sending to your Galaxy Sheet...</div>
            </div>

        </div>
    </main>

    <script>
        // === AUDIO SYNTHESIZER ===
        const audioState = { soundEnabled: true, audioContext: null, masterGain: null };
        function initAudio() {
            if (audioState.audioContext) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            audioState.audioContext = new AudioContext();
            audioState.masterGain = audioState.audioContext.createGain();
            audioState.masterGain.gain.value = 0.2;
            audioState.masterGain.connect(audioState.audioContext.destination);
        }
        function forceUnlockAudioContext() { initAudio(); if (audioState.audioContext && audioState.audioContext.state === "suspended") { audioState.audioContext.resume(); } }
        function playTone(frequency, duration, type = "sine", gain = 0.08, delay = 0) {
            initAudio(); if (!audioState.audioContext) return; if (audioState.audioContext.state === "suspended") audioState.audioContext.resume();
            const now = audioState.audioContext.currentTime + delay; const osc = audioState.audioContext.createOscillator(); const vol = audioState.audioContext.createGain();
            osc.type = type; osc.frequency.setValueAtTime(frequency, now); vol.gain.setValueAtTime(gain, now); vol.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(vol).connect(audioState.masterGain); osc.start(now); osc.stop(now + duration + 0.02);
        }
        function playPixelSound(name) {
            const g = 0.07;
            if (name === "click") playTone(520, .06, "square", g);
            if (name === "hover") playTone(740, .04, "triangle", 0.025);
            if (name === "coin") { playTone(880, .08, "triangle", g); playTone(1320, .1, "triangle", g, .06); }
            if (name === "success") { playTone(659, .12, "sine", g); playTone(988, .18, "sine", g, .1); }
        }
        function attachSoundEvents() {
            document.querySelectorAll(".game-button:not(:disabled), input[type='checkbox']").forEach(el => {
                if (!el.hasAttribute('data-sound-bound')) {
                    el.addEventListener("mouseenter", () => playPixelSound("hover"));
                    el.addEventListener("click", () => playPixelSound("click"));
                    el.setAttribute('data-sound-bound', 'true');
                }
            });
        }
        window.addEventListener("click", forceUnlockAudioContext); window.addEventListener("touchstart", forceUnlockAudioContext);

        // === SMART CLOUD WEEK CALCULATOR ===
        function getISOWeekKey(d = new Date()) {
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            const weekNum = 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            return `${date.getFullYear()}_W${weekNum}`;
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbwbGMBs2GJoySlJh8ukXk9n_m3wvMehXn0xCbIU3UMFcgp4Oi7ycZwKhmzr4dfUI4Pm/exec";
        
        let currentDayType = 'Work';
        let dbData = null; 
        let todayLunch = "";
        let todayDinner = "";
        let currentWeekKey = getISOWeekKey();

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { document.getElementById("galaxy-loader").classList.add("hidden"); attachSoundEvents(); }, 1800); 
        });

        document.addEventListener("mousemove", event => {
            if (window.innerWidth < 768) return; 
            const x = (event.clientX / window.innerWidth - .5) * 2;
            const y = (event.clientY / window.innerHeight - .5) * 2;
            document.getElementById("app-shell").style.transform = `rotateY(${x * 3}deg) rotateX(${-y * 3}deg)`;
        });

        function setupDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US', options);
        }

        async function fetchDatabase() {
            try {
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                dbData = await response.json();
                
                if(dbData.ui) {
                    document.getElementById('appTitle').innerText = dbData.ui['app_title'] || "Glow Up Planner";
                    document.getElementById('btnWork').innerText = dbData.ui['btn_work'] || "Work Day";
                    document.getElementById('btnOff').innerText = dbData.ui['btn_off'] || "Day Off";
                    document.getElementById('btnTravel').innerText = dbData.ui['btn_travel'] || "Travel";
                    document.getElementById('titleMenu').innerText = dbData.ui['title_menu'] || "Today's Menu";
                    document.getElementById('titleDaily').innerText = dbData.ui['title_daily'] || "Daily Quests";
                    document.getElementById('titleWeekly').innerText = dbData.ui['title_weekly'] || "Weekly Quests";
                    document.getElementById('btnComplete').innerText = dbData.ui['btn_complete'] || "Complete!";
                }
                
                checkIfAlreadyCompleted();
                generateMeals();
                generateTasks();
            } catch (error) { console.error("Error fetching data", error); }
        }

        // 🛠 SAFARI/IOS HOTFIX APPLIED HERE!
        function checkIfAlreadyCompleted() {
            if (!dbData || !dbData.logs) return;
            const btn = document.getElementById('btnComplete');
            let alreadyCompleted = false;
            const today = new Date();
            
            dbData.logs.forEach(rawLog => {
                // Look for Date key no matter how Google Sheets formatted it
                const dateKey = Object.keys(rawLog).find(k => k.toLowerCase().trim() === 'date');
                let dateStr = dateKey ? rawLog[dateKey] : null;

                // Safari hates "Friday, July 17, 2026", so we strip out "Friday, " to make it "July 17, 2026"
                if (typeof dateStr === 'string') dateStr = dateStr.replace(/^[A-Za-z]+,\s*/, '');
                
                let logDate = new Date(dateStr);

                if (!isNaN(logDate) && 
                    logDate.getDate() === today.getDate() && 
                    logDate.getMonth() === today.getMonth() && 
                    logDate.getFullYear() === today.getFullYear()) {
                    alreadyCompleted = true;
                }
            });

            if (alreadyCompleted) {
                btn.disabled = true;
                btn.innerText = "Already Completed Today! ✨";
            }
        }

        function setDayType(type) {
            currentDayType = type;
            document.getElementById('btnWork').classList.remove('active'); document.getElementById('btnOff').classList.remove('active'); document.getElementById('btnTravel').classList.remove('active');
            document.getElementById('btn' + type).classList.add('active');
            document.getElementById('timeInputs').style.display = (type === 'Work') ? 'block' : 'none';
            generateMeals(); generateTasks();
        }

        function generateMeals() {
            if (!dbData) return;
            const weekSpots = dbData.restaurants.Weekday; const weekendSpots = dbData.restaurants.Weekend;
            if (currentDayType === 'Work') { todayLunch = weekSpots[Math.floor(Math.random() * weekSpots.length)]; todayDinner = weekSpots[Math.floor(Math.random() * weekSpots.length)]; } 
            else if (currentDayType === 'Off') { todayLunch = weekendSpots[Math.floor(Math.random() * weekendSpots.length)]; todayDinner = weekendSpots[Math.floor(Math.random() * weekendSpots.length)]; } 
            else { todayLunch = "Explore Local Vegan Food!"; todayDinner = "Explore Local Vegan Food!"; }
            document.getElementById('lunchRandom').innerText = todayLunch; document.getElementById('dinnerRandom').innerText = todayDinner;
        }

        function generateTasks() {
            if (!dbData || !dbData.ui) return;
            const dailyList = document.getElementById('dailyTasks'); const weeklyList = document.getElementById('weeklyTasks');
            const dateNumber = new Date().getDate();
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            
            dailyList.innerHTML = ""; weeklyList.innerHTML = "";

            if (currentDayType !== 'Travel') {
                dailyList.innerHTML += createTaskHTML("gym", dbData.ui['task_gym']);
                dailyList.innerHTML += createTaskHTML("edit", dbData.ui['task_edit']);
                dailyList.innerHTML += createTaskHTML("video", dbData.ui['task_video']);
            } else {
                dailyList.innerHTML += createTaskHTML("travel_cardio", dbData.ui['task_travel_cardio']);
                dailyList.innerHTML += createTaskHTML("travel_film", dbData.ui['task_travel_film']);
            }

            if (currentDayType !== 'Travel') {
                document.getElementById('weeklyContainer').style.display = 'block';
                
                let doneLaundry = false; let doneClean = false; let doneSavings = false;
                let isHairDone = false; let isBrowsDone = false; let isLaserDone = false;
                
                // 🛠 BULLETPROOF DATA GRABBER APPLIED HERE!
                if (dbData.logs) {
                    dbData.logs.forEach(rawLog => {
                        // Helper to find data no matter the casing or spacing!
                        const getVal = (key) => {
                            const found = Object.keys(rawLog).find(k => k.toLowerCase().trim() === key.toLowerCase());
                            return found ? rawLog[found] : undefined;
                        };

                        let dateStr = getVal('Date');
                        if (!dateStr) return; // Skip empty rows
                        
                        // Fix for strict browsers (Safari)
                        if (typeof dateStr === 'string') dateStr = dateStr.replace(/^[A-Za-z]+,\s*/, '');
                        
                        let logDate = new Date(dateStr);
                        
                        if (!isNaN(logDate)) {
                            // Check Weekly chores
                            if (getISOWeekKey(logDate) === currentWeekKey) {
                                if (String(getVal('Laundry_Done')).toLowerCase() === "true") doneLaundry = true;
                                if (String(getVal('DeepClean_Done')).toLowerCase() === "true") doneClean = true;
                            }
                            
                            // Check Monthly tasks (Savings & Beauty)
                            if (logDate.getMonth() === currentMonth && logDate.getFullYear() === currentYear) {
                                
                                let savingsVal = getVal('Savings_KRW');
                                if (String(savingsVal).toLowerCase() === "true" || String(savingsVal).toLowerCase() === "done" || Number(savingsVal) > 0) {
                                    doneSavings = true;
                                }
                                
                                let beautyVal = getVal('Beauty_Done');
                                if (beautyVal && typeof beautyVal === 'string') {
                                    if (beautyVal.includes("HaircutDone")) isHairDone = true;
                                    if (beautyVal.includes("BrowsDone")) isBrowsDone = true;
                                    if (beautyVal.includes("LaserDone")) isLaserDone = true;
                                }
                            }
                        }
                    });
                }

                let weeklyTasksAdded = 0;
                if (!doneLaundry) { weeklyList.innerHTML += createTaskHTML("laundry", dbData.ui['task_laundry']); weeklyTasksAdded++; }
                if (!doneClean) { weeklyList.innerHTML += createTaskHTML("clean", dbData.ui['task_clean']); weeklyTasksAdded++; }
                
                let savingsTaskName = dbData.ui['task_savings'] || "Monthly Savings";
                if (doneSavings) {
                    weeklyList.innerHTML += `<li class="task-item completed"><span class="task-text">✨ ${savingsTaskName} (Completed)</span></li>`;
                    weeklyTasksAdded++;
                } else {
                    if (dateNumber >= 12) {
                        weeklyList.innerHTML += `<li class="task-item overdue" id="item_savings">
                            <input type="checkbox" id="savings" onchange="styleCheckbox(this, 'item_savings')">
                            <span class="task-text">🚨 ${savingsTaskName} (OVERDUE!)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    } else {
                        weeklyList.innerHTML += `<li class="task-item upcoming">
                            <span class="task-text">⏳ ${savingsTaskName} (Upcoming on 12th)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    }
                }

                let hairTaskName = dbData.ui['task_beauty_hair'] || "Haircut";
                if (isHairDone) {
                    weeklyList.innerHTML += `<li class="task-item completed"><span class="task-text">✨ ${hairTaskName} (Completed)</span></li>`;
                    weeklyTasksAdded++;
                } else {
                    if (dateNumber >= 17) {
                        weeklyList.innerHTML += `<li class="task-item overdue" id="item_beauty_hair">
                            <input type="checkbox" id="beauty_hair" onchange="styleCheckbox(this, 'item_beauty_hair')">
                            <span class="task-text">🚨 ${hairTaskName} (OVERDUE!)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    } else {
                        weeklyList.innerHTML += `<li class="task-item upcoming">
                            <span class="task-text">⏳ ${hairTaskName} (Upcoming on 17th)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    }
                }

                let browsTaskName = dbData.ui['task_beauty_brows'] || "Eyebrow Waxing & Bleach";
                if (isBrowsDone) {
                    weeklyList.innerHTML += `<li class="task-item completed"><span class="task-text">✨ ${browsTaskName} (Completed)</span></li>`;
                    weeklyTasksAdded++;
                } else {
                    if (dateNumber >= 17) {
                        weeklyList.innerHTML += `<li class="task-item overdue" id="item_beauty_brows">
                            <input type="checkbox" id="beauty_brows" onchange="styleCheckbox(this, 'item_beauty_brows')">
                            <span class="task-text">🚨 ${browsTaskName} (OVERDUE!)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    } else {
                        weeklyList.innerHTML += `<li class="task-item upcoming">
                            <span class="task-text">⏳ ${browsTaskName} (Upcoming on 17th)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    }
                }

                let laserTaskName = dbData.ui['task_beauty_laser'] || "Laser Treatment";
                if (isLaserDone) {
                    weeklyList.innerHTML += `<li class="task-item completed"><span class="task-text">✨ ${laserTaskName} (Completed)</span></li>`;
                    weeklyTasksAdded++;
                } else {
                    if (dateNumber >= 21) {
                        weeklyList.innerHTML += `<li class="task-item overdue" id="item_beauty_laser">
                            <input type="checkbox" id="beauty_laser" onchange="styleCheckbox(this, 'item_beauty_laser')">
                            <span class="task-text">🚨 ${laserTaskName} (OVERDUE!)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    } else {
                        weeklyList.innerHTML += `<li class="task-item upcoming">
                            <span class="task-text">⏳ ${laserTaskName} (Upcoming on 21st)</span>
                        </li>`;
                        weeklyTasksAdded++;
                    }
                }
                
                if (weeklyTasksAdded === 0) { weeklyList.innerHTML = `<li style="text-align:center; color: var(--ink-soft); font-weight:800; font-size:14px; padding: 10px;">✨ All weekly & monthly quests complete! ✨</li>`; }
            } else {
                document.getElementById('weeklyContainer').style.display = 'none';
            }
            attachSoundEvents(); 
        }

        function createTaskHTML(id, text) {
            return `<li class="task-item" id="item_${id}"><input type="checkbox" id="${id}" onchange="styleCheckbox(this, 'item_${id}')"><span class="task-text">${text || 'Task'}</span></li>`;
        }

        function styleCheckbox(checkbox, itemId) {
            if(checkbox.checked) { playPixelSound("coin"); document.getElementById(itemId).classList.add('completed'); } 
            else { document.getElementById(itemId).classList.remove('completed'); }
        }

        async function saveProgress() {
            if (currentDayType !== 'Travel') {
                const gym = document.getElementById('gym')?.checked;
                const edit = document.getElementById('edit')?.checked;
                const video = document.getElementById('video')?.checked;
                if (!gym || !edit || !video) {
                    alert("🌱 Little habits matter! This will shape your future. Discipline is key. Please do it, at least for two minutes! No excuses allowed. 🛑");
                    return;
                }
            } else {
                const cardio = document.getElementById('travel_cardio')?.checked;
                const film = document.getElementById('travel_film')?.checked;
                if (!cardio || !film) {
                    alert("🌱 Even on vacation, little habits matter! This will shape your future. Discipline is key. No excuses allowed. 🛑");
                    return;
                }
            }

            if (currentDayType === 'Work') {
                const now = new Date();
                const endInput = document.getElementById('endTime').value.split(":");
                const startInput = document.getElementById('startTime').value.split(":");
                
                const endTime = new Date(); endTime.setHours(endInput[0], endInput[1], 0);
                const startTime = new Date(); startTime.setHours(startInput[0], startInput[1], 0);

                if (now >= endTime) {
                    const hoursWorked = ((endTime - startTime) / (1000 * 60 * 60)).toFixed(1);
                    alert(`🎉 Congrats, thank you for working! You've crushed it and worked ${hoursWorked} hours today. Time to rest!`);
                } else {
                    const hoursLeft = ((endTime - now) / (1000 * 60 * 60)).toFixed(1);
                    alert(`💪 You got this! ${hoursLeft} more hours before leaving the office. Keep that main character energy going!`);
                }
            }

            const btn = document.getElementById('btnComplete');
            btn.disabled = true;
            btn.innerText = "Already Completed Today! ✨";

            playPixelSound("success");
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors: ['#ff94cf', '#b5f7d3', '#8ee7ff', '#ffe58f'] });
            document.getElementById('loading').style.display = 'block';

            const isLaundryDone = document.getElementById('laundry') ? document.getElementById('laundry').checked : false;
            const isCleanDone = document.getElementById('clean') ? document.getElementById('clean').checked : false;
            const isSavingsDone = document.getElementById('savings') ? document.getElementById('savings').checked : false;
            const isHairChecked = document.getElementById('beauty_hair') ? document.getElementById('beauty_hair').checked : false;
            const isBrowsChecked = document.getElementById('beauty_brows') ? document.getElementById('beauty_brows').checked : false;
            const isLaserChecked = document.getElementById('beauty_laser') ? document.getElementById('beauty_laser').checked : false;

            let beautyArr = [];
            if (isLaserChecked) beautyArr.push("LaserDone"); 
            if (isHairChecked) beautyArr.push("HaircutDone"); 
            if (isBrowsChecked) beautyArr.push("BrowsDone");
            let beautyStatus = beautyArr.length > 0 ? beautyArr.join(", ") : false;
            
            const payload = {
                Date: document.getElementById('dateDisplay').innerText,
                Day_Type: currentDayType, Start_Time: currentDayType === 'Work' ? document.getElementById('startTime').value : "N/A", End_Time: currentDayType === 'Work' ? document.getElementById('endTime').value : "N/A",
                Lunch: todayLunch, Dinner: todayDinner,
                Gym_10min: document.getElementById('gym') ? document.getElementById('gym').checked : false,
                Edit_2min: document.getElementById('edit') ? document.getElementById('edit').checked : false,
                Video_Watched: document.getElementById('video') ? document.getElementById('video').checked : false,
                Travel_Cardio: document.getElementById('travel_cardio') ? document.getElementById('travel_cardio').checked : false,
                Travel_Film: document.getElementById('travel_film') ? document.getElementById('travel_film').checked : false,
                Laundry_Done: isLaundryDone, DeepClean_Done: isCleanDone, 
                Beauty_Done: beautyStatus, 
                Savings_KRW: isSavingsDone 
            };

            if (!dbData.logs) dbData.logs = [];
            dbData.logs.push({ 
                Date: payload.Date, 
                Laundry_Done: payload.Laundry_Done, 
                DeepClean_Done: payload.DeepClean_Done, 
                Savings_KRW: payload.Savings_KRW,
                Beauty_Done: payload.Beauty_Done,
                Travel_Cardio: payload.Travel_Cardio,
                Travel_Film: payload.Travel_Film
            });
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                document.getElementById('loading').innerText = "✨ Saved to the Galaxy! ✨";
                setTimeout(() => { document.getElementById('loading').style.display = 'none'; generateTasks(); }, 2000);
            } catch(e) { document.getElementById('loading').innerText = "Error saving. Connection lost in space."; }
        }

        setupDate(); setDayType('Work'); fetchDatabase(); 
    </script>
</body>
